<!DOCTYPE html>
<html lang="en">
<head>
    <script src="data.js"></script>
    <meta charset="UTF-8">
    <title>HearthStone</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <link rel="icon" type="image/x-icon" href="images/favicon.png">
    <link rel="stylesheet" type="text/css" href="miEstilo.css">
    <meta name="viewport" content="width=device-width">
</head>
<body onload="actualizarCantidadHeroes()">
<div id="app">
<img src="images/logo_header.webp" class="logo">

<template>
    <div id="appS">
      <input v-model="searchQuery">
      <div v-for="hero in filteredHeroes" :key="hero.heroName">{{r.title}}</div>
    </div>
</template>

<p>Cantidad de Heroes: <span id="cantidad-heroes"></span></p>
<p>Primeros Puestos: <span id="cantidad-1st"></span> 
    <img src="images/trophy-96.png" alt="Trophy" style="width: 20px; height: 20px; vertical-align: middle;">
</p>
<p>Podio Top 4: <span id="cantidad-4th"></span> </p>
<div id="app" class="container-fluid">
    <div class="row mb-3">
        <div class="col-2">
            <input type="text" v-model="searchQuery" class="form-control" placeholder="Search for a hero">
        </div>
    </div>
    <div class="row">
        <div v-for="hero in filteredItems" class="col-sm-6 col-md-2 d-flex">
            <div class="card flex-fill mb-3">
                <div class="card-header">
                    <div class="titleContainer" id="titleContainer"> 
                        <h4>{{ hero.heroName }}</h4>
                    </div>
                    <img :src="hero.heroImg" :alt="'Imagen de ' + hero.heroName" :style="{filter: hero.firstPlace ? '' : hero.fourthPlace ? 'sepia(90%)' : 'grayscale(100%)'}">
                    <!--<p>Gane: {{hero.firstPlace}}</p>
                    <p>4to: {{hero.fourthPlace}}</p>-->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            searchQuery: '',
            heroes: datos
        },
        computed: {
            filteredItems() {
                return this.heroes.filter((hero) => {
                    return hero.heroName.toLowerCase().includes(this.searchQuery.toLowerCase());
                });
            }
        },
    });
</script>


</body>
</html>
